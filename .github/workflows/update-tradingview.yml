name: Update TradingView Watchlists (Online)

on:
  schedule:
    - cron: "0 2 * * *"  # 毎日 UTC 02:00 = JST 11:00
  workflow_dispatch:

jobs:
  update-tv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Run updater
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          TRADINGVIEW_STORAGE_STATE: ${{ secrets.TRADINGVIEW_STORAGE_STATE }}

          WATCHLIST_1_URL: ${{ secrets.WATCHLIST_1_URL }}
          WATCHLIST_2_URL: ${{ secrets.WATCHLIST_2_URL }}

          WATCHLIST_1_NAME: ${{ vars.WATCHLIST_1_NAME }}
          WATCHLIST_2_NAME: ${{ vars.WATCHLIST_2_NAME }}

          DO_DELETE_ALERTS: "false"
          DO_DELETE_WATCHLISTS: "false"
          DO_IMPORT_WATCHLISTS: "true"
          DO_CREATE_WATCHLIST_ALERT: "false"
        run: npm run update
