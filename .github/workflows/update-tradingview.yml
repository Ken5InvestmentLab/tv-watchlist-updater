name: TV Watchlist Update (Playwright)

on:
  push:
    branches: [main]
    paths: ["**.js"]
  repository_dispatch:
    types: [build_complete]
  workflow_dispatch:

concurrency:
  group: tv-watchlist-updater
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || npm i
          npx playwright install --with-deps

      - name: Run updater
        env:
          TRADINGVIEW_STORAGE_STATE: ${{ secrets.TRADINGVIEW_STORAGE_STATE }}
          WATCHLIST_1_URL: ${{ secrets.WATCHLIST_1_URL }}
          WATCHLIST_2_URL: ${{ secrets.WATCHLIST_2_URL }}
          WATCHLIST_1_NAME: ${{ vars.WATCHLIST_1_NAME }}
          WATCHLIST_2_NAME: ${{ vars.WATCHLIST_2_NAME }}
          DO_DELETE_ALERTS: "true"
          DO_DELETE_WATCHLISTS: "true"
          DO_IMPORT_WATCHLISTS: "true"
          DO_CREATE_WATCHLIST_ALERT: "true"
          ALERT_CONDITION_NAME: ${{ vars.ALERT_CONDITION_NAME }}
          ALERT_TIMEFRAME_LABEL: ${{ vars.ALERT_TIMEFRAME_LABEL }}
        run: npm run update

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tv-debug
          path: tmp/**/*.png
          if-no-files-found: ignore

      - name: Notify Discord on Success
        if: success()
        run: |
          payload='{
            "username": "System Log",
            "content": "🟢 **[System] Browser Automation Success**",
            "embeds": [{
              "title": "Update Completed",
              "description": "TradingViewのウォッチリストとアラートの更新がすべて完了しました！",
              "color": 65280
            }]
          }'

          notify_failed=0

          send_webhook() {
            local url="$1"
            local name="$2"

            if [ -z "$url" ]; then
              echo "::warning::$name is empty. Skip."
              return 0
            fi

            echo "Sending to $name ..."
            if ! curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$payload" \
              "$url"; then
              echo "::warning::Failed to send Discord notification: $name"
              notify_failed=1
            else
              echo "Success: $name"
            fi

            return 0
          }

          send_webhook "${{ secrets.DISCORD_WEBHOOK_1 }}" "DISCORD_WEBHOOK_1"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_2 }}" "DISCORD_WEBHOOK_2"

          if [ "$notify_failed" -ne 0 ]; then
            echo "::warning::One or more Discord notifications failed, but workflow will continue."
          fi

      - name: Notify Discord on Failure
        if: failure()
        run: |
          payload='{
            "username": "System Log",
            "content": "🔴 **[System] Browser Automation Error**",
            "embeds": [{
              "title": "Playwright Error Log",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "TradingViewの操作中にエラーが発生しました。UI変更の可能性があります。",
              "color": 16711680
            }]
          }'

          notify_failed=0

          send_webhook() {
            local url="$1"
            local name="$2"

            if [ -z "$url" ]; then
              echo "::warning::$name is empty. Skip."
              return 0
            fi

            echo "Sending to $name ..."
            if ! curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$payload" \
              "$url"; then
              echo "::warning::Failed to send Discord failure notification: $name"
              notify_failed=1
            else
              echo "Success: $name"
            fi

            return 0
          }

          send_webhook "${{ secrets.DISCORD_WEBHOOK_1 }}" "DISCORD_WEBHOOK_1"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_2 }}" "DISCORD_WEBHOOK_2"

          if [ "$notify_failed" -ne 0 ]; then
            echo "::warning::One or more Discord failure notifications failed."
          fi

      - name: Create Auto-Fix Issue on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          gh label create "auto-fix-needed" \
            --color "FF4444" \
            --description "Claude Code自動修正待ち" 2>/dev/null || true

          EXISTING=$(gh issue list \
            --label "auto-fix-needed" \
            --state open \
            --json number \
            --jq length)

          if [ "$EXISTING" -ne 0 ]; then
            echo "既存のauto-fix Issueが存在します。スキップします。"
            exit 0
          fi

          # スクリーンショットをdebug/screenshotsブランチにpush
          SCREENSHOT_PATHS=""
          SCREENSHOTS=$(find tmp -name "*.png" 2>/dev/null | sort | head -20)

          if [ -n "$SCREENSHOTS" ]; then
            git fetch origin debug/screenshots 2>/dev/null || true
            git checkout --orphan debug/screenshots-tmp
            git rm -rf . --quiet 2>/dev/null || true
            mkdir -p .debug
            for f in $SCREENSHOTS; do
              dest=".debug/$(basename "$f")"
              cp "$f" "$dest"
              SCREENSHOT_PATHS="$SCREENSHOT_PATHS\n- \`$dest\`"
            done
            git add .debug/
            git commit -m "debug: screenshots from run ${{ github.run_id }}"
            git push origin HEAD:debug/screenshots --force
            git checkout -
          fi

          # Issue作成
          BODY="## ワークフロー失敗レポート

**実行URL:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
**トリガー:** ${{ github.event_name }}
**ブランチ:** ${{ github.ref_name }}
**コミット:** ${{ github.sha }}

## デバッグスクリーンショット
ブランチ \`debug/screenshots\` の以下のパスを確認してください:"

          if [ -n "$SCREENSHOT_PATHS" ]; then
            BODY="$BODY$(printf "$SCREENSHOT_PATHS")"
          else
            BODY="$BODY
スクリーンショットなし"
          fi

          BODY="$BODY

このIssueはClaude Code自動修正ボットによって処理されます。修正完了後に自動でクローズされます。"

          gh issue create \
            --title "[auto-fix] ワークフロー失敗" \
            --body "$BODY" \
            --label "auto-fix-needed"
          echo "Auto-fix Issueを作成しました。"
