name: TV Watchlist Update (Playwright)

on:
  repository_dispatch:
    types: [build_complete]
  workflow_dispatch:

concurrency:
  group: tv-watchlist-updater
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: |
          npm ci || npm i
          npx playwright install --with-deps

      - name: Run updater
        env:
          TRADINGVIEW_STORAGE_STATE: ${{ secrets.TRADINGVIEW_STORAGE_STATE }}
          WATCHLIST_1_URL: ${{ secrets.WATCHLIST_1_URL }}
          WATCHLIST_2_URL: ${{ secrets.WATCHLIST_2_URL }}
          WATCHLIST_1_NAME: ${{ vars.WATCHLIST_1_NAME }}
          WATCHLIST_2_NAME: ${{ vars.WATCHLIST_2_NAME }}
          DO_DELETE_ALERTS: "true"
          DO_DELETE_WATCHLISTS: "true"
          DO_IMPORT_WATCHLISTS: "true"
          DO_CREATE_WATCHLIST_ALERT: "true"
          ALERT_CONDITION_NAME: ${{ vars.ALERT_CONDITION_NAME }}
          ALERT_TIMEFRAME_LABEL: ${{ vars.ALERT_TIMEFRAME_LABEL }}
        run: npm run update

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tv-debug
          path: tmp/**/*.png
          if-no-files-found: ignore

      - name: Notify Discord on Success
        if: success()
        run: |
          payload='{
            "username": "System Log",
            "content": "🟢 **[System] Browser Automation Success**",
            "embeds": [{
              "title": "Update Completed",
              "description": "TradingViewのウォッチリストとアラートの更新がすべて完了しました！",
              "color": 65280
            }]
          }'

          notify_failed=0

          send_webhook() {
            local url="$1"
            local name="$2"

            if [ -z "$url" ]; then
              echo "::warning::$name is empty. Skip."
              return 0
            fi

            echo "Sending to $name ..."
            if ! curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$payload" \
              "$url"; then
              echo "::warning::Failed to send Discord notification: $name"
              notify_failed=1
            else
              echo "Success: $name"
            fi

            return 0
          }

          send_webhook "${{ secrets.DISCORD_WEBHOOK_1 }}" "DISCORD_WEBHOOK_1"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_2 }}" "DISCORD_WEBHOOK_2"

          if [ "$notify_failed" -ne 0 ]; then
            echo "::warning::One or more Discord notifications failed, but workflow will continue."
          fi

      - name: Notify Discord on Failure
        if: failure()
        run: |
          payload='{
            "username": "System Log",
            "content": "🔴 **[System] Browser Automation Error**",
            "embeds": [{
              "title": "Playwright Error Log",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "TradingViewの操作中にエラーが発生しました。UI変更の可能性があります。",
              "color": 16711680
            }]
          }'

          notify_failed=0

          send_webhook() {
            local url="$1"
            local name="$2"

            if [ -z "$url" ]; then
              echo "::warning::$name is empty. Skip."
              return 0
            fi

            echo "Sending to $name ..."
            if ! curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$payload" \
              "$url"; then
              echo "::warning::Failed to send Discord failure notification: $name"
              notify_failed=1
            else
              echo "Success: $name"
            fi

            return 0
          }

          send_webhook "${{ secrets.DISCORD_WEBHOOK_1 }}" "DISCORD_WEBHOOK_1"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_2 }}" "DISCORD_WEBHOOK_2"

          if [ "$notify_failed" -ne 0 ]; then
            echo "::warning::One or more Discord failure notifications failed."
          fi
