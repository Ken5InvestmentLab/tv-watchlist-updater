name: Auto-Fix on Failure

on:
  workflow_run:
    workflows: ["TV Watchlist Update (Playwright)"]
    types: [completed]

jobs:
  create-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create auto-fix label if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-fix-needed" \
            --color "FF4444" \
            --description "Claude Code自動修正待ち" 2>/dev/null || true

      - name: Check for existing auto-fix issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --label "auto-fix-needed" \
            --state open \
            --json number \
            --jq length 2>/dev/null || echo "0")
          echo "existing=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Download and commit debug screenshots
        if: steps.check.outputs.existing == '0'
        id: screenshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          ARTIFACT_ID=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name=="tv-debug") | .id' 2>/dev/null | head -1)

          HAS_SCREENSHOTS="false"

          if [ -n "$ARTIFACT_ID" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
              > screenshots.zip 2>/dev/null || true

            if [ -s screenshots.zip ]; then
              mkdir -p .debug
              unzip -o screenshots.zip -d .debug/ 2>/dev/null || true
              mapfile -t PNGS < <(find .debug -name "*.png" | sort | head -20)

              if [ "${#PNGS[@]}" -gt 0 ]; then
                git config user.email "actions@github.com"
                git config user.name "GitHub Actions"

                TMPDIR_PNGS=$(mktemp -d)
                for f in "${PNGS[@]}"; do
                  cp "$f" "${TMPDIR_PNGS}/$(basename "$f")"
                done

                git checkout --orphan debug-screenshots-work
                git rm -rf . --quiet 2>/dev/null || true

                mkdir -p .debug
                cp "${TMPDIR_PNGS}"/*.png .debug/

                git add .debug/
                git commit -m "debug: screenshots from run ${RUN_ID}"
                git push origin HEAD:debug/screenshots --force

                HAS_SCREENSHOTS="true"
              fi
            fi
          fi

          echo "has_screenshots=${HAS_SCREENSHOTS}" >> "$GITHUB_OUTPUT"

      - name: Create auto-fix issue
        if: steps.check.outputs.existing == '0'
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "${{ steps.screenshots.outputs.has_screenshots }}" = "true" ]; then
            SCREENSHOT_SECTION="スクリーンショットは \`debug/screenshots\` ブランチの \`.debug/\` フォルダに保存されました。"
          else
            SCREENSHOT_SECTION="スクリーンショットなし（アーティファクトが見つかりませんでした）"
          fi

          BODY=$(cat <<EOF
          ## ワークフロー失敗レポート

          **実行URL:** ${RUN_URL}
          **トリガー:** ${RUN_EVENT}
          **ブランチ:** ${RUN_BRANCH}
          **コミット:** ${RUN_SHA}

          ## デバッグスクリーンショット
          ${SCREENSHOT_SECTION}

          このIssueはClaude Code自動修正ボットによって処理されます。修正完了後に自動でクローズされます。
          EOF
          )

          ISSUE_URL=$(gh issue create \
            --title "[auto-fix] ワークフロー失敗: ${RUN_BRANCH}" \
            --label "auto-fix-needed" \
            --body "${BODY}")

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create diagnostic PR for Routines trigger
        if: steps.check.outputs.existing == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          ISSUE_NUMBER: ${{ steps.create-issue.outputs.issue_number }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

          # スクリーンショットステップ後のブランチ状態をリセットしてmainに戻る
          git fetch origin main
          git checkout main

          BRANCH_NAME="auto-fix/run-${RUN_ID}"

          # 既存ブランチがあれば重複作成をスキップ
          if git ls-remote --exit-code origin "${BRANCH_NAME}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH_NAME} already exists, skipping PR creation"
            exit 0
          fi

          git checkout -b "${BRANCH_NAME}"

          # Routinesトリガー用のマーカーファイルを作成
          mkdir -p .github
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{"run_id":"%s","timestamp":"%s"}\n' "${RUN_ID}" "${TIMESTAMP}" \
            > .github/auto-fix-trigger.json

          git add .github/auto-fix-trigger.json
          git commit -m "auto-fix: trigger for run ${RUN_ID}"
          git push origin "${BRANCH_NAME}"

          PR_BODY=$(cat <<EOF
          ## 自動修正トリガー (Claude Code Routines)

          このPRはClaude Code Routinesを起動するためのトリガーです。
          **⚠️ マージしないでください。修正完了後に自動でクローズされます。**

          ---

          **失敗したワークフロー:** ${RUN_URL}
          **Issue:** #${ISSUE_NUMBER}

          ## Claude Code 対応手順
          1. Issue #${ISSUE_NUMBER} のエラーログを確認
          2. \`debug/screenshots\` ブランチの \`.debug/\` フォルダのスクリーンショットを確認
          3. \`update-watchlist.js\` を修正
          4. \`claude/nifty-pascal-Z5aiC\` ブランチにコミット・プッシュ → main にマージ
          5. \`TV Watchlist Update (Playwright)\` ワークフローを再実行して成功を確認
          6. このPRをクローズ、Issue #${ISSUE_NUMBER} をクローズ
          EOF
          )

          gh pr create \
            --title "[auto-fix] ワークフロー失敗: ${RUN_BRANCH}" \
            --body "${PR_BODY}" \
            --base main \
            --head "${BRANCH_NAME}" \
            --label "auto-fix-needed" \
            2>/dev/null || echo "::warning::PR creation failed (may already exist)"
