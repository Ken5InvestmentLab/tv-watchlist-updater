name: Auto-Fix Issue on Failure

on:
  workflow_run:
    workflows: ["TV Watchlist Update (Playwright)"]
    types: [completed]

jobs:
  create-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Create auto-fix label if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-fix-needed" \
            --color "FF4444" \
            --description "Codex 30分監視の自動修復待ち" 2>/dev/null || true

      - name: Check for existing auto-fix issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --label "auto-fix-needed" \
            --state open \
            --json number \
            --jq length 2>/dev/null || echo "0")
          echo "existing=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Download and commit debug screenshots
        if: steps.check.outputs.existing == '0'
        id: screenshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          ARTIFACT_ID=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name=="tv-debug") | .id' 2>/dev/null | head -1)

          HAS_SCREENSHOTS="false"

          if [ -n "$ARTIFACT_ID" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
              > screenshots.zip 2>/dev/null || true

            if [ -s screenshots.zip ]; then
              mkdir -p .debug
              unzip -o screenshots.zip -d .debug/ 2>/dev/null || true
              mapfile -t PNGS < <(find .debug -name "*.png" | sort | head -20)

              if [ "${#PNGS[@]}" -gt 0 ]; then
                git config user.email "actions@github.com"
                git config user.name "GitHub Actions"

                TMPDIR_PNGS=$(mktemp -d)
                for f in "${PNGS[@]}"; do
                  cp "$f" "${TMPDIR_PNGS}/$(basename "$f")"
                done

                git checkout --orphan debug-screenshots-work
                git rm -rf . --quiet 2>/dev/null || true

                mkdir -p .debug
                cp "${TMPDIR_PNGS}"/*.png .debug/

                git add .debug/
                git commit -m "debug: screenshots from run ${RUN_ID}"
                git push origin HEAD:debug/screenshots --force

                HAS_SCREENSHOTS="true"
              fi
            fi
          fi

          echo "has_screenshots=${HAS_SCREENSHOTS}" >> "$GITHUB_OUTPUT"

      - name: Create auto-fix issue
        if: steps.check.outputs.existing == '0'
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          AUTOFIX_AUTO_MERGE: ${{ vars.AUTOFIX_AUTO_MERGE }}
        run: |
          if [ "${{ steps.screenshots.outputs.has_screenshots }}" = "true" ]; then
            SCREENSHOT_SECTION="スクリーンショットは \`debug/screenshots\` ブランチの \`.debug/\` フォルダに保存されました。"
          else
            SCREENSHOT_SECTION="スクリーンショットなし（アーティファクトが見つかりませんでした）"
          fi

          if [ "$AUTOFIX_AUTO_MERGE" = "true" ]; then
            AUTO_MERGE_POLICY="true（Codexは検証成功後に自動マージ・Issueクローズ・main再実行まで進めます）"
          else
            AUTO_MERGE_POLICY="false（Codexは修正PR作成まで進め、PRはレビュー待ちで残します）"
          fi

          BODY=$(cat <<EOF
          ## ワークフロー失敗レポート

          **実行URL:** ${RUN_URL}
          **トリガー:** ${RUN_EVENT}
          **ブランチ:** ${RUN_BRANCH}
          **コミット:** ${RUN_SHA}

          ## デバッグスクリーンショット
          ${SCREENSHOT_SECTION}

          ## Codex 30分監視
          このIssueはCodexアプリの30分監視オートメーションが検知します。

          GitHub Actions内ではOpenAI APIキーやAI Actionを使いません。Codexがローカルワークスペースで原因調査と修復を行います。

          ## 自動マージポリシー
          AUTOFIX_AUTO_MERGE: ${AUTO_MERGE_POLICY}

          - GitHub Variables の \`AUTOFIX_AUTO_MERGE\` が \`true\` の場合: Codexは修正PRを作成し、検証成功後にPRマージ、Issueクローズ、mainワークフロー再実行まで行います。
          - 未設定または \`true\` 以外の場合: Codexは修正push/PR作成まで行い、PRはレビュー待ちで残します。

          Retry tracking marker: \`[codex-auto-fix-attempt]\`
          EOF
          )

          gh issue create \
            --title "[auto-fix] ワークフロー失敗: ${RUN_BRANCH}" \
            --label "auto-fix-needed" \
            --body "${BODY}"
