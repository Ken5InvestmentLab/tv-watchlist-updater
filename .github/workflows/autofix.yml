name: Auto-Fix on Failure

on:
  workflow_run:
    workflows: ["TV Watchlist Update (Playwright)"]
    types: [completed]

jobs:
  create-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - name: Create auto-fix label if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-fix-needed" \
            --color "FF4444" \
            --description "Claude Code自動修正待ち" 2>/dev/null || true

      - name: Check for existing auto-fix issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --label "auto-fix-needed" \
            --state open \
            --json number \
            --jq length 2>/dev/null || echo "0")
          echo "existing=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Download and commit debug screenshots
        if: steps.check.outputs.existing == '0'
        id: screenshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          ARTIFACT_ID=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name=="tv-debug") | .id' 2>/dev/null | head -1)

          HAS_SCREENSHOTS="false"

          if [ -n "$ARTIFACT_ID" ]; then
            gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" \
              > screenshots.zip 2>/dev/null || true

            if [ -s screenshots.zip ]; then
              mkdir -p .debug
              unzip -o screenshots.zip -d .debug/ 2>/dev/null || true
              mapfile -t PNGS < <(find .debug -name "*.png" | sort | head -20)

              if [ "${#PNGS[@]}" -gt 0 ]; then
                git config user.email "actions@github.com"
                git config user.name "GitHub Actions"

                # Save PNGs before switching branches
                TMPDIR_PNGS=$(mktemp -d)
                for f in "${PNGS[@]}"; do
                  cp "$f" "${TMPDIR_PNGS}/$(basename "$f")"
                done

                git checkout --orphan debug-screenshots-work
                git rm -rf . --quiet 2>/dev/null || true

                mkdir -p .debug
                cp "${TMPDIR_PNGS}"/*.png .debug/

                git add .debug/
                git commit -m "debug: screenshots from run ${RUN_ID}"
                git push origin HEAD:debug/screenshots --force

                HAS_SCREENSHOTS="true"
              fi
            fi
          fi

          echo "has_screenshots=${HAS_SCREENSHOTS}" >> "$GITHUB_OUTPUT"

      - name: Create auto-fix issue
        if: steps.check.outputs.existing == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.screenshots.outputs.has_screenshots }}" = "true" ]; then
            SCREENSHOT_SECTION="スクリーンショットは \`debug/screenshots\` ブランチの \`.debug/\` フォルダに保存されました。"
          else
            SCREENSHOT_SECTION="スクリーンショットなし（アーティファクトが見つかりませんでした）"
          fi

          gh issue create \
            --title "[auto-fix] ワークフロー失敗: ${{ github.event.workflow_run.head_branch }}" \
            --label "auto-fix-needed" \
            --body "## ワークフロー失敗レポート

**実行URL:** ${{ github.event.workflow_run.html_url }}
**トリガー:** ${{ github.event.workflow_run.event }}
**ブランチ:** ${{ github.event.workflow_run.head_branch }}
**コミット:** ${{ github.event.workflow_run.head_sha }}

## デバッグスクリーンショット
${SCREENSHOT_SECTION}

このIssueはClaude Code自動修正ボットによって処理されます。修正完了後に自動でクローズされます。"
