name: Auto Fix on Failure

on:
  workflow_run:
    workflows: ["TV Watchlist Update (Playwright)"]
    types: [completed]

jobs:
  auto-fix:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 10

      - name: Check retry count
        id: retry-check
        run: |
          COUNT=$(git log --pretty=format:"%s" -6 | grep -c "^\[auto-fix\]" || true)
          echo "retry_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "現在の連続auto-fixコミット数: $COUNT"
          if [ "$COUNT" -ge 5 ]; then
            echo "::error::最大リトライ回数(5回)に達しました。自動修正を停止します。"
            exit 1
          fi

      - name: Download failed run logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          mkdir -p logs_dir
          echo "ログをダウンロード中... (run_id: $RUN_ID)"
          if gh api \
            "repos/${{ github.repository }}/actions/runs/${RUN_ID}/logs" \
            > logs.zip 2>/dev/null; then
            unzip -o logs.zip -d logs_dir 2>/dev/null || true
            echo "ログの取得成功"
          else
            echo "::warning::ログの取得に失敗しました。コードのみで分析します。"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Run Claude auto-fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RETRY_COUNT: ${{ steps.retry-check.outputs.retry_count }}
        run: node scripts/auto-fix.js

      - name: Commit and push fix
        run: |
          git config user.email "claude-auto-fix@github-actions"
          git config user.name "Claude Auto-Fix Bot"
          git add -A
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi
          ATTEMPT=$(( ${{ steps.retry-check.outputs.retry_count }} + 1 ))
          git commit -m "[auto-fix] 自動修正 試行${ATTEMPT}/5"
          git push -u origin main

      - name: Notify Discord on auto-fix applied
        if: success()
        run: |
          payload='{
            "username": "System Log",
            "content": "🔧 **[Auto-Fix] コード修正を適用しました**",
            "embeds": [{
              "title": "自動修正ワークフロー",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "エラーを検知してコードを自動修正しました。ワークフローを再実行します。",
              "color": 16776960
            }]
          }'
          send_webhook() {
            local url="$1"
            if [ -z "$url" ]; then return 0; fi
            curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST -d "$payload" "$url" || true
          }
          send_webhook "${{ secrets.DISCORD_WEBHOOK_1 }}"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_2 }}"

      - name: Notify Discord on max retries reached
        if: failure()
        run: |
          payload='{
            "username": "System Log",
            "content": "⛔ **[Auto-Fix] 最大リトライ回数に達しました**",
            "embeds": [{
              "title": "自動修正失敗",
              "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "description": "5回の自動修正試行がすべて失敗しました。手動での確認が必要です。",
              "color": 16711680
            }]
          }'
          send_webhook() {
            local url="$1"
            if [ -z "$url" ]; then return 0; fi
            curl --fail --silent --show-error \
              -H "Content-Type: application/json" \
              -X POST -d "$payload" "$url" || true
          }
          send_webhook "${{ secrets.DISCORD_WEBHOOK_1 }}"
          send_webhook "${{ secrets.DISCORD_WEBHOOK_2 }}"
